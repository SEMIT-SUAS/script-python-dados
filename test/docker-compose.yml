services:
  db:
    image: postgres:17
    container_name: pg_adi_test
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_adi_test
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./uploads-test:/home/suas/Arquivo-digital-inteligente/uploads
volumes:
  pgdata:
